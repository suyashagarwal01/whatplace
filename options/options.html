<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>WhatPlace – Settings</title>
  <link rel="stylesheet" href="options.css">
</head>
<body>
  <div class="container">
    <h1>WhatPlace Settings</h1>

    <section class="section">
      <label for="apiKey">Google Gemini API key (free)</label>
      <input type="password" id="apiKey" placeholder="Paste your API key" autocomplete="off">
      <p class="hint">
        Get a free key at
        <a href="https://aistudio.google.com/apikey" target="_blank" rel="noopener">Google AI Studio</a>.
        Used only to analyze screenshots; nothing is stored on our servers.
      </p>
    </section>

    <div class="actions">
      <button id="save" type="button">Save</button>
      <span id="saveStatus" class="status"></span>
    </div>
  </div>
  <script src="options.js"></script>
</body>
</html>
